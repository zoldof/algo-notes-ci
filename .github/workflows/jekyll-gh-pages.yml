name: Build and push changed dist directories

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  # CD_REPO: algo-notes
  # CI_REPO: algo-notes-ci
  # DIST: dist
  # DOMAIN: https://zoldof.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CI_REPO: ${{ github.event.repository.name }}  
      DIST: dist
      DOMAIN: https://${{ github.repository_owner }}.com
    steps:
      - name: Derive CD_REPO (remove last 3 chars)
        run: |
          CD_REPO="${CI_REPO::-3}"
          echo "CD_REPO=$CD_REPO" >> $GITHUB_ENV

      # ソースリポジトリ
      - name: Checkout source
        uses: actions/checkout@v4
      
      # origin の URL を取得して環境変数 ORIGIN_URL に保存
      - name: Set ORIGIN_URL env var
        id: set_origin
        run: |
          # origin の URL を取得
          ORIGIN_URL=$(git remote get-url origin)
          echo "ORIGIN_URL=$ORIGIN_URL" >> "$GITHUB_ENV"
          
      # 確認用：環境変数が正しく設定されたか出力
      - name: Show ORIGIN_URL
        run: echo "Origin URL is $ORIGIN_URL"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./docs/_site

      # ターゲットリポジトリ
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{env.CD_REPO}}
          token: ${{ secrets.PAT_FOR_TARGET }}
          path: target-repo

      # dist 直下で差分のあるディレクトリを検出
      - name: Detect changed dist directories
        run: |
          mkdir -p /tmp/changed_dirs
          > /tmp/changed_dirs/list

          for dir in docs/_site/${{env.DIST}}/*; do
            name=$(basename "$dir")

            if [ ! -d "target-repo/$name" ]; then
              echo "$name" >> /tmp/changed_dirs/list
              continue
            fi

            if ! diff -qr "$dir" "target-repo/$name" >/dev/null; then
              echo "$name" >> /tmp/changed_dirs/list
            fi
          done

          sort -u /tmp/changed_dirs/list -o /tmp/changed_dirs/list
          cat /tmp/changed_dirs/list

      # 変更があったディレクトリだけ同期
      - name: Sync changed directories
        run: |
          if [ ! -s /tmp/changed_dirs/list ]; then
            echo "No changed dist directories"
            exit 0
          else
            NOW=$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")
            echo "NOW=$NOW" >> $GITHUB_ENV
          fi

          while read dir; do
            rsync -a --delete "docs/_site/${{env.DIST}}/$dir/" "target-repo/$dir/"
          done < /tmp/changed_dirs/list

      - name: Sync index.html
        run: |
          cat << 'EOF' > /tmp/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <script>
              location.replace("https://${{ github.repository_owner }}.github.io/${{ env.CI_REPO }}/?dname=menu");
            </script>
          </head>
          <body></body>
          </html>
          EOF

          rsync /tmp/index.html target-repo/index.html

      - name: Sync sitemap
        run: |
          if [ -z "$NOW" ] && [ -f "target-repo/sitemap.xml" ]; then
            NOW=$(grep -oPm1 '(?<=<lastmod>)[^<]+' target-repo/sitemap.xml)
          fi
          sed -E "s|$DOMAIN/$CI_REPO/(dist/)?|$DOMAIN/|; s|<lastmod>.*</lastmod>|<lastmod>$NOW</lastmod>|" \
          docs/_site/sitemap.xml \
          > /tmp/sitemap.xml

          rsync /tmp/sitemap.xml target-repo/sitemap.xml

      # commit & push
      - name: Commit and push
        run: |
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Deploy updated dist directories"
            git push origin HEAD:main
          else
            echo "No changes to deploy"
          fi
