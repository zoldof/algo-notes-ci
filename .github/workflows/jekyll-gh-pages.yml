name: Build and push changed dist directories

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # 複数の環境変数定義
      CI_REPO: ${{ github.event.repository.name }}  
      CD_REPO: ""
      DIST: dist
      DOMAIN: ""
    steps:
      # 環境変数 CD_REPO 設定
      - name: Derive CD_REPO (remove last 3 chars)
        run: |
          CD_REPO="${CI_REPO::-3}"
          echo "CD_REPO=$CD_REPO" >> $GITHUB_ENV

      # ソースリポジトリ
      - name: Checkout source
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./docs/_site

      # ターゲットリポジトリ
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ env.CD_REPO }}
          token: ${{ secrets.PAT_FOR_TARGET }}
          path: target-repo
          
      # 環境変数 DOMAIN 設定
      - name: Derive DOMAIN
        run: |
          DOMAIN="https://$(cat target-repo/CNAME | tr -d '\r\n')"
          echo "DOMAIN=$DOMAIN" >> $GITHUB_ENV

      # dist 直下で差分のあるディレクトリを検出
      - name: Detect changed dist directories
        run: |
          mkdir -p /tmp/changed_dirs
          > /tmp/changed_dirs/list

          for dir in docs/_site/${{env.DIST}}/*; do
            name=$(basename "$dir")

            if [ ! -d "target-repo/$name" ]; then
              echo "$name" >> /tmp/changed_dirs/list
              continue
            fi

            if ! diff -qr "$dir" "target-repo/$name" >/dev/null; then
              echo "$name" >> /tmp/changed_dirs/list
            fi
          done

          sort -u /tmp/changed_dirs/list -o /tmp/changed_dirs/list
          cat /tmp/changed_dirs/list

      # 変更があったディレクトリだけ同期
      - name: Sync changed directories
        run: |
          if [ ! -s /tmp/changed_dirs/list ]; then
            echo "No changed dist directories"
            exit 0
          else
            NOW=$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")
            echo "NOW=$NOW" >> $GITHUB_ENV
          fi

          while read dir; do
            rsync -a --delete "docs/_site/${{env.DIST}}/$dir/" "target-repo/$dir/"
          done < /tmp/changed_dirs/list

      # CD側にラッパーhtml更新生成
      - name: Sync index.html
        run: |
          cat << 'EOF' > /tmp/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <script>
              location.replace("https://${{ github.repository_owner }}.github.io/${{ env.CI_REPO }}/?dname=menu");
            </script>
          </head>
          <body></body>
          </html>
          EOF

          rsync /tmp/index.html target-repo/index.html

      # DOMAIN に基づいた sitemap の修正
      - name: Sync sitemap
        run: |
          if [ -z "$NOW" ] && [ -f "target-repo/sitemap.xml" ]; then
            NOW=$(grep -oPm1 '(?<=<lastmod>)[^<]+' target-repo/sitemap.xml)
          fi
          sed -E "s|https://${{ github.repository_owner }}.github.io/$CI_REPO/($DIST/)?|$DOMAIN/|; s|<lastmod>.*</lastmod>|<lastmod>$NOW</lastmod>|" \
          docs/_site/sitemap.xml \
          > /tmp/sitemap.xml

          rsync /tmp/sitemap.xml target-repo/sitemap.xml

      # commit & push
      - name: Commit and push
        run: |
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Deploy updated dist directories"
            git push origin HEAD:main
          else
            echo "No changes to deploy"
          fi
