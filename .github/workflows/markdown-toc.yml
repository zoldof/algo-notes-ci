name: Generate Table of Contents
permissions:
  contents: write

on:
  # 手動で対象ファイルを指定できる
  workflow_dispatch:
    inputs:
      file:
        description: |
          更新したい Markdown ファイル（1 つだけ）。例: README.md
        required: true
        default: README.md
  # push 時に変更された Markdown が 1 つだけという前提で自動実行
  push:
    paths:
      - '**/*.md'   # .md が変更されたときだけ起動

jobs:
  generate-toc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdown-toc
        run: npm install -g markdown-toc

      # -------------------------------------------------
      # ③ 変更対象ファイル（単一）を決定
      # -------------------------------------------------
      - name: Determine target file
        id: target
        run: |
          # 手動実行 → 入力値をそのまま使用
          if [ -n "${{ github.event.inputs.file }}" ]; then
            echo "FILE=${{ github.event.inputs.file }}" >> $GITHUB_OUTPUT
          else
            # push 実行 → 変更された .md を取得（0〜1 件を想定）
            MOD=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
                  | grep -E '\.md$' || true)   # 変更が無いときは空文字
            echo "FILE=$MOD" >> $GITHUB_OUTPUT
          fi

      # -------------------------------------------------
      # ④ TOC を生成
      # -------------------------------------------------
      - name: Update TOC
        env:
          FILE: ${{ steps.target.outputs.FILE }}
        run: |
          if [ -z "$FILE" ]; then
            echo "⚠️ No markdown file to process – exit."
            exit 0
          fi

          if [[ -f "$FILE" ]]; then
            echo "🔧 Updating TOC in $FILE"
            markdown-toc -i "$FILE"
          else
            echo "⚠️ File not found: $FILE"
            exit 1
          fi

      # -------------------------------------------------
      # ⑤ 変更を自動コミット
      # -------------------------------------------------
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔧 Update Table of Contents"
          skip_dirty_check: true
