name: Generate TOC for README
permissions:
  contents: write

on:
  push:
    paths:
      - '*.md'

jobs:
  toc:
    runs-on: ubuntu-latest
    env:
      TARGET: proto‑best‑practices.md
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdown-toc
        run: npm install -g markdown-toc

      - name: Update TOC
        run: |
          echo "🔧 Updating TOC in $TARGET"
          markdown-toc -i "$TARGET"

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔧 Update TOC in ${{ env.TARGET }} (auto on push)"
