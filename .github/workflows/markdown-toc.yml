name: Generate Table of Contents

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      files:
        description: |
          更新したい Markdown ファイル（カンマ区切り）
        required: true
        default: README.md

  push:
    paths:
      - 'bestpractice.md'

jobs:
  generate-toc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdown-toc
        run: npm install -g markdown-toc

      - name: Generate TOC
        run: |
          # 手動実行時
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then

            IFS=',' read -ra FILE_ARR <<< "${{ github.event.inputs.files }}"

            for f in "${FILE_ARR[@]}"; do
              FILE=$(echo "$f" | xargs)

              if [[ -f "$FILE" ]]; then
                echo "🔧 Updating TOC in $FILE"
                markdown-toc -i "$FILE"
              else
                echo "⚠️ File not found: $FILE"
              fi
            done

          # push時
          elif [[ "${{ github.event_name }}" == "push" ]]; then

            echo "🔧 Updating TOC in bestpractice.md"
            markdown-toc -i bestpractice.md

          fi

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔧 Update Table of Contents"
          skip_dirty_check: true
