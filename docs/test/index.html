<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>しおり（文字横固定）</title>

<style>
body {
  font-family: sans-serif;
  line-height: 1.6;
  padding: 40px;
}

h2 {
  margin-top: 100px;
  padding: 10px;
  background: #f0f0f0;
}

/* テキストラッパー */
.h2-text {
  display: inline-block;
  position: relative;
}

/* しおり */
#bookmark {
  position: absolute;
  padding: 4px 8px;
  background: #ffcc00;
  border-radius: 6px;
  cursor: grab;
  z-index: 1000;
  user-select: none;
}
</style>
</head>

<body>

<div id="bookmark">しおり</div>

<h1>テスト記事</h1>

<h2 id="sec1"><span class="h2-text">セクション1</span></h2>
<p>内容...</p>

<h2 id="sec2"><span class="h2-text">セクション2</span></h2>
<p>内容...</p>

<h2 id="sec3"><span class="h2-text">セクション3</span></h2>
<p>内容...</p>

<h2 id="sec4"><span class="h2-text">セクション4</span></h2>
<p>内容...</p>

<script>
const bookmark = document.getElementById("bookmark");
const sections = document.querySelectorAll("h2");

let offsetX, offsetY;
let isDragging = false;

/* ======================
   ドラッグ
====================== */
bookmark.addEventListener("mousedown", (e) => {
  isDragging = true;
  offsetX = e.clientX - bookmark.offsetLeft;
  offsetY = e.clientY - bookmark.offsetTop;

  function move(e) {
    if (!isDragging) return;

    bookmark.style.left = (e.clientX - offsetX) + "px";
    bookmark.style.top = (e.clientY - offsetY) + "px";
  }

  function up() {
    isDragging = false;

    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", up);

    snapToSection();
  }

  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup", up);
});

/* ======================
   吸着（縦だけで判定）
====================== */
function snapToSection() {
  let closest = null;
  let minDist = Infinity;

  const by = bookmark.getBoundingClientRect().top;

  sections.forEach(sec => {
    const rect = sec.getBoundingClientRect();
    const dist = Math.abs(rect.top - by);

    if (dist < minDist) {
      minDist = dist;
      closest = sec;
    }
  });

  if (closest) {
    setBookmark(closest);
  }
}

/* ======================
   配置（文字の右）
====================== */
function setBookmark(section) {
  const textEl = section.querySelector(".h2-text");
  const rect = textEl.getBoundingClientRect();

  bookmark.style.left = (window.scrollX + rect.right + 6) + "px";
  bookmark.style.top = (window.scrollY + rect.top) + "px";

  localStorage.setItem("bookmark-section", section.id);
}

/* ======================
   復元
====================== */
function loadBookmark() {
  const id = localStorage.getItem("bookmark-section");
  if (!id) return;

  const target = document.getElementById(id);
  if (!target) return;

  setBookmark(target);
}

loadBookmark();
</script>

</body>
</html>
