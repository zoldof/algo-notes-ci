<header class="site-header">
{% if show_site_title %}
  <div class="site-title">
    {{ site.title }}
  </div>
  <div id="bookmark"></div>
{% endif %}
  <a href="{{ origin_url }}">📖メニュー</a>
  <a href="https://{{ site.github.owner_name }}.github.io/{{ map_path }}" {{ site.ela }}>🫧マップ</a>
  <a href="https://{{ site.github.owner_name }}.github.io/{{ hajime_path }}" {{ site.ela }}>🔰はじめに</a>
  <a href="https://twitter.com/intent/tweet?url={{ full_url }}" {{ site.ela }}>🐦Tweet</a>
  <a href="https://social-plugins.line.me/lineit/share?url={{ full_url }}" {{ site.ela }}>🍀LINE</a>
</header>
