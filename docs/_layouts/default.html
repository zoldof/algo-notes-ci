<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google-site-verification" content="{{ site.google_site_verification }}">
  <meta name="robots" content="{{ page.robots }}">
  <meta name="description" content="{{ page.description }}">
  <!-- Check dist ⇔ menu -->
  {% if page.url == "/dist/" %}
    {% assign slug = "menu" %}
  {% else %}
    {% assign slug = page.url | replace: 'index.html', '' | split:'/' |  reject: '' | last %}
  {% endif %}
  <link rel="canonical" href="https://{{ site.github.owner_name }}.com{% unless slug == 'menu' %}/{{ slug }}{% endunless %}/">
  <title>{{ page.title }}</title>
  <!-- Include -->
  {% include katex.html %}
  <!-- General -->
  <link rel="icon" href="{{ site.cdn_base }}main/docs/favicon.png">
  <link rel="apple-touch-icon" href="{{ site.cdn_base }}main/docs/favicon.png">
  <link rel="stylesheet" href="{{ site.cdn_base }}main/docs/style.css">
  <!-- Test and Purge -->  
  <!--<link rel="stylesheet" href="{{ site.cdn_base }}{{ "site.github.build_revision" }}/docs/style.css">-->
  <!-- https://purge.jsdelivr.net/gh/zoldof/algo-notes-ci@main/docs -->
</head>
{% if slug == "menu" %}
  <header class="site-header">
    <div class="site-title">
      {{ site.title }}
    </div>
    <div id="bookmark"></div>
  </header>
{% endif %}
<body class="page-{{ slug }}">
  <div id="content">
    <!-- Liquid -->
    {{ content }}
  </div>
  <script type="module">
    import { renderKatex } from "{{ site.cdn_base }}main/docs/katex.js";
    import { addBackToTopLinks } from "{{ site.cdn_base }}main/docs/backtop.js";
    import { initListener, load } from "{{ site.cdn_base }}main/docs/bookmark.js";
    document.addEventListener("DOMContentLoaded", async () => {
      renderKatex(document.getElementById("content"));
      addBackToTopLinks();
      if (document.body.classList.contains('page-menu')) {
        initListener();
        load();
      }
    });
  </script>
</body>
</html>
