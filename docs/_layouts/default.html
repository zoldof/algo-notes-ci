<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google-site-verification" content="{{ site.google_site_verification }}">
  <meta name="robots" content="{{ page.robots }}">
  <meta name="description" content="{{ page.description }}">
  <!-- Include -->
  {% include katex.html %}
  {% include assign-og.html %}
  <link rel="canonical" href="{{ full_url }}">
  <title>{{ page.title }}</title>
  <!-- General -->
  <link rel="icon" href="{{ site.cdn_base }}main/docs/favicon.png">
  <link rel="apple-touch-icon" href="{{ site.cdn_base }}main/docs/favicon.png">
  <link rel="stylesheet" href="{{ site.cdn_base }}main/docs/style.css">
  <!-- Test and Purge *コメントの中身でもビルドバージョン変更が反映されるのでクォートで囲っている -->  
  <!-- href="{{ site.cdn_base }}{{ 'site.github.build_revision' }}/docs/style.css"> -->
  <!-- append: 'site.github.build_revision' | -->
  <!-- https://purge.jsdelivr.net/gh/zoldof/algo-notes-ci@main/docs -->
</head>
<header class="site-header">
{% if slug == "menu" %}
  <div class="site-title">
    {{ site.title }}
  </div>
  <div id="bookmark"></div>
{% endif %}
  <a href="{{ origin_url }}">📖メニュー</a>
  <a href="https://{{ site.github.owner_name }}.github.io/algo-notes-ci/?dname=hajime">🔰はじめに</a>
  <a href="https://twitter.com/intent/tweet?url={{ full_url }}">🐦Tweet</a>
  <a href="https://social-plugins.line.me/lineit/share?url={{ full_url }}">🍀LINE</a>
</header>

<body class="page-{{ slug }}">
  <div id="content">
    <!-- Liquid -->
    {{ content }}
  </div>
  <script type="module">
    import { renderKatex } from "{{ site.cdn_base }}main/docs/katex.js";
    import { addBackToTopLinks } from "{{ site.cdn_base }}main/docs/backtop.js";
    import { initListener, load } from "{{ site.cdn_base }}main/docs/bookmark.js";
    document.addEventListener("DOMContentLoaded", async () => {
      renderKatex(document.getElementById("content"));
      addBackToTopLinks();
      if (document.body.classList.contains('page-menu')) {
        initListener();
        load();
      }
    });
  </script>
</body>
</html>
