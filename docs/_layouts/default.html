<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google-site-verification" content="{{ site.google_site_verification }}">
  <meta name="robots" content="{{ page.robots }}">
  <meta name="description" content="{{ page.description }}">
  {% assign slug = page.url | replace: 'index.html', '' | split:'/' |  reject: '' | last %}
  {% if page.url != "/" %}
    <link rel="canonical" href="https://{{ site.github.owner_name }}.com/{{ slug }}/">
  {% endif %}
  <title>{{ page.title }}</title>
  <!-- Include -->
  {% include katex.html %}
  <!-- General -->
  <link rel="icon" href="{{ site.cdn_base }}/favicon.png">
  <link rel="apple-touch-icon" href="{{ site.cdn_base }}/favicon.png">
  <link rel="stylesheet" href="{{ site.cdn_base }}/style.css?v={{ site.time }}">
</head>
<header class="site-header">
  <div class="site-title">
    {{ site.title }}
  </div>
</header>
<body class="page-{{ slug }}">
  <div id="content">
    <!-- Liquid -->
    {{ content }}
  </div>
  <script type="module">
    import { renderKatex } from "{{ site.cdn_base }}/katex.js";
    import { addBackToTopLinks } from "{{ site.cdn_base }}/backtop.js";
    document.addEventListener("DOMContentLoaded", async () => {
      renderKatex(document.getElementById("content"));
      addBackToTopLinks();
    });
  </script>
</body>
</html>
