<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="{{ page.robots }}">
  <title>{{ page.title }}</title>
  <!-- Include -->
  {% include katex.html %}
  <!-- General -->
  <link rel="icon" href="{{ site.cdn_base }}/favicon.png">
  <link rel="apple-touch-icon" href="{{ site.cdn_base }}/favicon.png">
  <link rel="stylesheet" href="{{ site.cdn_base }}/style.css">
</head>
<body class="page-{{ page.url
                 | split:'/'               # 「/」で分割 → 配列になる
                 | last                    # 配列の最後の要素（ファイル名）を取得
                 | replace_last:'.md',''   # .md も除去したいとき
                 | slugify }}">
  <div id="content">
    <!-- Liquid -->
    {{ content }}
  </div>
  <script type="module">
    import { renderKatex } from "{{ site.cdn_base }}/katex.js";
    import { addBackToTopLinks } from "{{ site.cdn_base }}/backtop.js";
    document.addEventListener("DOMContentLoaded", async () => {
      renderKatex(document.getElementById("content"));
      addBackToTopLinks();
    });
  </script>
</body>
</html>
